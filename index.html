<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Snake game</title>
  </head>
  <body>
    <section>
      <div id="infos">
        <div class="info">
          <h3>High-Score:</h3>
          <span class="high-score">00000</span>
        </div>
        <div class="info">
          <h3>Current Score:</h3>
          <span class="current-score">00000</span>
        </div>
        <div class="info">
          <h3>Time Elapse:</h3>
          <span class="Time Elapsed">00.00</span>
        </div>
      </div>
      <div id="board"></div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
